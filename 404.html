<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="404.title">404 — Page Not Found | Ciudadela Digital</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="nav__logo">
        <img src="assets/img/isotype.png" alt="Ciudadela Digital" class="nav__logo-img">
        <span class="nav__logo-text">Ciudadela<em>Digital</em></span>
      </a>
      <div class="nav__menu" id="nav-menu">
        <a href="index.html#about" class="nav__link" data-i18n="nav.about">About</a>
        <a href="index.html#games" class="nav__link" data-i18n="nav.games">Games</a>
        <a href="index.html#contact" class="nav__link" data-i18n="nav.contact">Contact</a>
        <button id="lang-toggle" class="nav__link" style="cursor: pointer; background: none; border: none; font: inherit;">ES</button>
      </div>
      <button class="nav__toggle" aria-expanded="false" aria-label="Toggle navigation">
        <span class="nav__toggle-bar"></span>
        <span class="nav__toggle-bar"></span>
        <span class="nav__toggle-bar"></span>
      </button>
    </nav>
  </header>

  <main class="error-page">
    <div class="error-page__glow"></div>
    <div class="error-page__content">
      <div class="error-code" data-i18n="404.code">404</div>
      <div class="error-label" data-i18n="404.label">Error 404 — Page Not Found</div>
      <h1 class="error-title" data-i18n="404.heading">You've entered the void.</h1>
      <p class="error-desc" data-i18n="404.desc">The page you were looking for doesn't exist, was moved, or maybe got deleted by a rogue AI. Happens to the best of us.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn--primary" data-i18n="404.cta.home">Go Back Home</a>
        <a href="index.html#games" class="btn btn--ghost" data-i18n="404.cta.games">See Our Games</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p><span data-i18n="footer.rights">© Ciudadela Digital. All rights reserved.</span> <span id="footer-year"></span></p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
